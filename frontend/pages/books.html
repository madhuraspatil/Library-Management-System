<div class="form-box">
  <input id="title" placeholder="Title" />
  <input id="author" placeholder="Author" />
  <input id="isbn" placeholder="ISBN" />
  <input id="category" placeholder="Category" />
  <input id="qty" type="number" placeholder="Quantity" value="1" />
  <button id="submitBtn" onclick="addBook()">Add Book</button>
  <button id="cancelBtn" onclick="cancelEdit()" 
    style="display:none; background:#6b7280">Cancel</button>
</div>
